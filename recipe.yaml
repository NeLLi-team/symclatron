context:
  # Tracks the latest published PyPI sdist. Repository code can be ahead between releases.
  version: 0.10.1

package:
  name: symclatron
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/s/symclatron/symclatron-${{ version }}.tar.gz
  sha256: bf4fdef6e064351512057e49ca887cb4e9892ca4e0c80428805f928bcbb0a60d

build:
  script:
    - sed -i 's/tensorflow-cpu/tensorflow/g' pyproject.toml
    - ${{ PYTHON }} -m pip install .
  python:
    entry_points:
    - symclatron = symclatron.symclatron:app
    - symcla = symclatron.symclatron:app
  noarch: python

requirements:
  host:
  - python >=3.12,<3.13
  - flit >=3.2,<4
  - pip
  run:
  - python >=3.12,<3.13
  - typer >=0.12.3,<0.13
  - click >=8.1,<8.2
  - pandas >=2.2.2,<2.3
  - numpy >=1.26.4,<2.0
  - xgboost >=2.1.1,<2.2
  - shap >=0.45.1,<0.46
  - scikit-learn ==1.6.0
  - tensorflow-cpu >=2.18.0,<2.19
  - joblib >=1.4.2,<1.5
  - pyhmmer >=0.12.0,<0.13
  - pyrodigal >=3.6.0,<3.7
  - psutil >=6.0,<8.0

tests:
- python:
    imports:
    - symclatron
    pip_check: true

about:
  summary: 'symclatron: symbiont classifier'
  description: |-
    symclatron classifies microbial genomes into three lifestyle categories:

    - Free-living
    - Symbiont;Host-associated
    - Symbiont;Obligate-intracellular

    It accepts protein FASTA directly, or nucleotide FASTA with automatic
    protein translation/prediction before classification.

    The packaged CLI provides three main commands:

    - `symclatron setup` to download the bundled data and models
    - `symclatron classify` to analyze user genomes
    - `symclatron test` to run the bundled self-check dataset

    Full user documentation is maintained in the repository README.
  documentation: https://github.com/NeLLi-team/symclatron#readme
